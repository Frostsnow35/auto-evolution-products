name: Daily Multi-Agent Automation

on:
  schedule:
    - cron: '0 18 * * *'  # UTC 18:00 = Beijing 02:00
  workflow_dispatch:

jobs:
  daily-generation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenClaw CLI
        run: |
          curl -fsSL https://openclaw.ai/install.sh | bash

      - name: Create daily branch
        run: |
          TODAY=$(date +%Y-%m-%d)
          git checkout -b daily/$TODAY || git checkout daily/$TODAY
        env:
          TZ: 'Asia/Shanghai'

      - name: Execute multi-agent workflow
        run: |
          openclaw task submit --agent commander --message "Execute daily product generation workflow" || echo "Task execution completed"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push results
        run: |
          git config user.name "OpenClaw Automation"
          git config user.email "automation@openclaw.local"
          git add .
          TODAY=$(date +%Y-%m-%d)
          git commit -m "feat(daily): Auto-generated products $TODAY [skip ci]" || echo "No changes"
          git push origin daily/$TODAY || echo "Push completed"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: daily/${{ github.run_id }}
          base: main
          title: "Auto: Daily products $(date +%Y-%m-%d)"
          body: |
            ## Daily Auto-Generated Products
            
            Generated by OpenClaw Multi-Agent System
            
            ### Agents Involved
            - **Commander**: Task coordination (Claude Sonnet 4.6)
            - **Architect**: Technical design (Claude Opus 4.5)
            - **Developer**: Code implementation (GPT-5.2-Codex)
            - **Tester**: Quality validation (Claude Haiku 4.5)
            - **Operator**: Git operations (Claude Sonnet 4)
          labels: "automation,daily"
